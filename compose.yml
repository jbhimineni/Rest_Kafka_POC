services:  zookeeper:    image: confluentinc/cp-zookeeper:7.4.0    ports:      - "22181:2181"  # Changed from 2181 to 22181    environment:      ZOOKEEPER_CLIENT_PORT: 2181      ZOOKEEPER_TICK_TIME: 2000  kafka:    image: confluentinc/cp-kafka:7.4.0    ports:      - "29092:29092"    environment:      KAFKA_BROKER_ID: 1      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181  # Leave this as is, it connects inside the Docker network      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:29092      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1    depends_on:      - zookeeper